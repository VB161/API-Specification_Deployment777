openapi: 3.0.0
info:
  title: Sales Analytics API 777
  version: 1.0.0
  description: API для аналитики продаж с интеграцией Greenplum/Hadoop
servers:
  - url: http://localhost:8080/api
paths:
  /sales/daily:
    get:
      summary: Ежедневные продажи по регионам
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: object
                properties:
                  daily_sales:
                    type: array
            items:
              type: object
              properties:
                region:
                  type: string
                total_amount:
                  type: number
                sale_date:
                  type: string
                  format: date
